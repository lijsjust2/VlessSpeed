<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订阅优选工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            min-height: 200px;
            resize: vertical;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        
        .info-box h3 {
            color: #1976d2;
            margin-bottom: 8px;
            font-size: 16px;
        }
        
        .info-box p {
            color: #424242;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .copy-button {
            background: #4caf50;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 10px;
        }
        
        .copy-button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 订阅优选工具</h1>
        <p class="subtitle">通过 IP 优选加速你的 VLESS Reality 订阅</p>
        
        <div class="info-box">
            <h3>📖 使用说明</h3>
            <p>1. 输入你的原订阅链接（VLESS Reality 格式）<br>
               2. 输入优选地址列表（每行一个，支持带节点名）<br>
               3. 点击保存配置<br>
               4. 访问 <strong>/sub</strong> 获取优选后的订阅链接</p>
        </div>
        
        <div class="form-group">
            <label for="originalSubscription">原订阅链接</label>
            <input type="text" id="originalSubscription" placeholder="vless://uuid@address:port?params#remark">
        </div>
        
        <div class="form-group">
            <label for="optimizedAddresses">优选地址列表（每行一个，格式：地址#节点名）</label>
            <textarea id="optimizedAddresses" placeholder="1.1.1.1:443#节点1&#10;2.2.2.2:443#节点2&#10;example.com#节点3"></textarea>
        </div>
        
        <div class="button-group">
            <button class="btn-primary" onclick="saveConfig()">💾 保存配置</button>
            <button class="btn-secondary" onclick="loadConfig()">📥 加载配置</button>
        </div>
        
        <div id="successMessage" class="success-message"></div>
        <div id="errorMessage" class="error-message"></div>
        
        <div class="info-box" style="margin-top: 30px;">
            <h3>🔗 获取优选订阅</h3>
            <p>保存配置后，访问以下链接获取优选后的订阅：</p>
            <p style="margin-top: 10px; font-family: 'Courier New', monospace; background: #f5f5f5; padding: 10px; border-radius: 4px;">
                <span id="subscriptionUrl">https://your-domain.com/sub</span>
            </p>
            <button class="copy-button" onclick="copySubscriptionUrl()">📋 复制订阅链接</button>
        </div>
    </div>
    
    <script>
        async function saveConfig() {
            const originalSubscription = document.getElementById('originalSubscription').value.trim();
            const optimizedAddresses = document.getElementById('optimizedAddresses').value.trim();
            
            if (!originalSubscription) {
                showError('请输入原订阅链接');
                return;
            }
            
            if (!optimizedAddresses) {
                showError('请输入优选地址列表');
                return;
            }
            
            const addresses = optimizedAddresses.split('\n').filter(addr => addr.trim());
            
            try {
                const response = await fetch('/admin/config.json', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        原订阅链接: originalSubscription,
                        优选地址: addresses
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showSuccess('配置保存成功！');
                    updateSubscriptionUrl();
                } else {
                    showError('保存失败：' + (result.error || '未知错误'));
                }
            } catch (error) {
                showError('保存失败：' + error.message);
            }
        }
        
        async function loadConfig() {
            try {
                const response = await fetch('/admin/config.json');
                const config = await response.json();
                
                document.getElementById('originalSubscription').value = config.原订阅链接 || '';
                document.getElementById('optimizedAddresses').value = (config.优选地址 || []).join('\n');
                
                showSuccess('配置加载成功！');
                updateSubscriptionUrl();
            } catch (error) {
                showError('加载配置失败：' + error.message);
            }
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            const errorDiv = document.getElementById('errorMessage');
            
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            errorDiv.style.display = 'none';
            
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            successDiv.style.display = 'none';
            
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        function updateSubscriptionUrl() {
            const url = window.location.origin + '/sub';
            document.getElementById('subscriptionUrl').textContent = url;
        }
        
        function copySubscriptionUrl() {
            const url = document.getElementById('subscriptionUrl').textContent;
            navigator.clipboard.writeText(url).then(() => {
                showSuccess('订阅链接已复制到剪贴板！');
            }).catch(err => {
                showError('复制失败：' + err.message);
            });
        }
        
        window.onload = function() {
            updateSubscriptionUrl();
            loadConfig();
        };
    </script>
</body>
</html>
